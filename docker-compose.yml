services:
  # БАЗА ДАННЫХ
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: super_password
      POSTGRES_DB: main_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # БЭКЕНД
  backend:
    build: 
      context: ./backend      
      dockerfile: dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql://db_user:super_password@db:5432/main_db
    volumes:
      - ./backend:/app        # Для горячей перезагрузки кода при разработке
    ports:
      - "8000:8000" # Тоже на время разработки
    depends_on:
      - db

  # frontend:
  #   image: node:18-alpine
  #   working_dir: /frontend/app
  #   command: sh -c "tail -f /dev/null"
  #   restart: always
  #   ports:
  #     - "3000:3000" просто шаблончик

volumes:
  postgres_data: