services:
  # БАЗА ДАННЫХ
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: super_password
      POSTGRES_DB: main_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # БЭКЕНД
  backend:
    build: 
      context: ./backend      
      dockerfile: dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql://db_user:super_password@db:5432/main_db
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    volumes:
      - ./backend:/app        # Для горячей перезагрузки кода при разработке
    ports:
      - "8000:8000" # Тоже на время разработки
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    working_dir: /app
    restart: always
    ports:
     - "5173:5173"
    volumes:
      - ./frontend:/app
     # - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
